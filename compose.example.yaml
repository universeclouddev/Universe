# Universe + Nova — example Docker Compose (single node)
#
# Runs the Universe master, the Nova web panel, and the Postgres database Nova
# needs, on one host.
#
# Bring-up order (Nova's API key is created at runtime, so it's a two-step start):
#   1. Create a .env next to this file (see the block at the bottom of this comment)
#      with POSTGRES_PASSWORD and SESSION_SECRET set.
#   2. docker compose -f compose.example.yaml up -d universe db
#   3. Create Nova's API key from the Universe console:
#        docker attach universe        # Ctrl-P Ctrl-Q to detach without stopping
#        > key create nova ALL
#      Paste the printed token into .env as UNIVERSE_API_KEY.
#   4. docker compose -f compose.example.yaml up -d nova
#   5. Open http://localhost:${NOVA_PORT:-3000} — Nova's /setup runs on first visit.
#
# Networking: Universe uses host networking (it binds the dynamic instance ports
# it allocates and reaches node-local Docker/Tailscale). Nova + Postgres run on
# the compose bridge and talk by service name (db:5432); Nova reaches the
# host-networked Universe via host.docker.internal (Linux: host-gateway).
#
# ── example .env ───────────────────────────────────────────────────────────────
#   POSTGRES_PASSWORD=a-strong-db-password
#   SESSION_SECRET=replace-with-32+-random-chars       # openssl rand -hex 32
#   UNIVERSE_API_KEY=                                   # paste the `key create nova ALL` token (step 3)
#   NOVA_PORT=3000
# ────────────────────────────────────────────────────────────────────────────────

services:
  # ── Orchestrator ──────────────────────────────────────────────────────────────
  universe:
    container_name: universe
    # Public image. (Internal builds: git.lunarlabs.dev/scala/universe:latest)
    image: ghcr.io/universeclouddev/universe:latest
    restart: unless-stopped

    # Interactive JLine console — keep a TTY + stdin so `docker attach universe`
    # gives a usable prompt (key create, extension list, …).
    tty: true
    stdin_open: true

    # Host networking: bind dynamic instance ports + reach node-local Docker /
    # Tailscale directly. On host networking a `ports:` list is ignored; 6000
    # (Hazelcast) and 7000 (REST API) bind straight onto the host.
    network_mode: host
    extra_hosts:
      - 'host.docker.internal:127.0.0.1'

    environment:
      - TERM=xterm-256color
      # Only used by the Kubernetes runtime extension (see the kube mount below):
      - KUBECONFIG=/root/.kube/config

    volumes:
      # Config + state (config.json, database.json, configuration/, templates,
      # logs, embedded H2 db).
      - ./data:/data
      # ── Optional, per runtime/extension — drop the ones you don't use ──────────
      # Docker runtime: launch instance containers on this host's Docker.
      - /var/run/docker.sock:/var/run/docker.sock
      # Kubernetes runtime: kubeconfig used to launch instance pods.
      - ./kube:/root/.kube:ro
      # Tailscale extension: expose mesh IPs as template variables.
      - /usr/bin/tailscale:/usr/bin/tailscale:ro
      - /run/tailscale:/var/run/tailscale

  # ── Nova's database ───────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: nova
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nova -d nova']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nova web panel ────────────────────────────────────────────────────────────
  nova:
    image: ghcr.io/universeclouddev/nova:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Bridge networking; reach the host-networked Universe through the host.
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      # 32+ char random string — encrypts sessions + stored secrets. Keep it stable.
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      # Postgres owned by this stack (the db service above).
      DATABASE_URL: postgresql://nova:${POSTGRES_PASSWORD}@db:5432/nova
      # Universe is host-networked, so reach its REST API via the host (incl. /api).
      UNIVERSE_URL: http://host.docker.internal:7000/api
      # The `key create nova ALL` token from step 3 (empty until you set it).
      UNIVERSE_API_KEY: ${UNIVERSE_API_KEY:-}
    ports:
      - '${NOVA_PORT:-3000}:3000'

volumes:
  pgdata:

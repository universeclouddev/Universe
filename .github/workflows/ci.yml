name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*.*.*"]
  pull_request:
    branches: ["production"]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/production' }}

      - name: Build all modules
        run: ./gradlew assemble --no-daemon

      - name: Upload built JARs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: universe-jars-${{ github.sha }}
          path: .built/
          retention-days: 7

  push-docker-beta:
    name: Push Beta Image
    needs: build
    # Beta images publish on production only — never on feature branches or PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/universe
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.JIB_TOKEN }}

      - name: Compute short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Beta builds publish BOTH ':beta' and the short commit SHA, never
      # ':latest' (reserved for prod releases). The SHA is the immutable base
      # ref (JIB_IMAGE); 'beta' is applied last as the moving tag (JIB_TAGS) so
      # it reads as the package's main/current tag.
      - name: Build and push beta image via Jib
        env:
          JIB_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}
          JIB_USERNAME: ${{ github.actor }}
          JIB_PASSWORD: ${{ secrets.JIB_TOKEN }}
          JIB_TAGS: beta
        run: ./gradlew :loader:jib --no-daemon

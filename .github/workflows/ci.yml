name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*.*.*"]
  pull_request:
    branches: ["main", "production"]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/production' }}

      - name: Build all modules
        run: ./gradlew assemble --no-daemon

      - name: Upload built JARs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: universe-jars-${{ github.sha }}
          path: .built/
          retention-days: 7

  push-docker:
    name: Push Image (${{ github.ref_name }})
    needs: build
    # Publish container images on the two mainline branches only:
    #   main       -> :beta   + :<sha>
    #   production -> :latest + :<sha>
    # Never on feature branches, PRs, or tags. ':latest' is production-only.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/universe
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.JIB_TOKEN }}

      # Moving tag is 'latest' on production, 'beta' on main. The short SHA is
      # the immutable base ref (JIB_IMAGE); the moving tag is applied last
      # (JIB_TAGS) so it reads as the package's main/current tag.
      - name: Compute tags
        id: vars
        run: |
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_REF}" = "refs/heads/production" ]; then
            echo "moving_tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "moving_tag=beta" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image via Jib
        env:
          JIB_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}
          JIB_USERNAME: ${{ github.actor }}
          JIB_PASSWORD: ${{ secrets.JIB_TOKEN }}
          JIB_TAGS: ${{ steps.vars.outputs.moving_tag }}
        run: ./gradlew :loader:jib --no-daemon

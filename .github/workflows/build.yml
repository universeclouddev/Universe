name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  build:
    name: Build & Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        java:
          - 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Compile all modules
        run: ./gradlew compileKotlin compileJava --no-daemon --stacktrace

      - name: Run tests
        run: ./gradlew test --no-daemon --stacktrace

      - name: Build shadow JARs
        run: ./gradlew shadowJar --no-daemon --stacktrace

      - name: Verify extension isolation
        run: |
          echo "Checking that extensions do not depend on :app module..."
          # Extensions should only depend on :api and :extensions:extension-api
          # This is a basic check; full validation happens in code review
          ./gradlew :extensions:runtime-docker:dependencies --configuration compileClasspath --no-daemon | grep -q ":app" && echo "::error::Extension runtime-docker depends on :app" && exit 1 || true
          ./gradlew :extensions:runtime-k8s:dependencies --configuration compileClasspath --no-daemon | grep -q ":app" && echo "::error::Extension runtime-k8s depends on :app" && exit 1 || true
          ./gradlew :extensions:storage-s3:dependencies --configuration compileClasspath --no-daemon | grep -q ":app" && echo "::error::Extension storage-s3 depends on :app" && exit 1 || true
          echo "Extension isolation check passed"

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: universe-jars-jdk${{ matrix.java }}
          path: .built/*.jar
          retention-days: 7

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk${{ matrix.java }}
          path: |
            **/build/reports/tests/
            **/build/reports/problems/
          retention-days: 14

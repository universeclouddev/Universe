name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/universe

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: extract-version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build all modules
        run: ./gradlew assemble --no-daemon

      - name: Upload built JARs
        uses: actions/upload-artifact@v4
        with:
          name: universe-jars
          path: .built/
          retention-days: 1

  push-docker:
    name: Push Docker Image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image via Jib
        env:
          JIB_GHCR_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          JIB_GHCR_USERNAME: ${{ github.actor }}
          JIB_GHCR_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          JIB_GHCR_TAGS: "latest,${{ needs.build.outputs.version }},${{ github.sha }}"
        run: ./gradlew :loader:jibGhcr --no-daemon

  release:
    name: Create GitHub Release
    needs: [build, push-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built JARs
        uses: actions/download-artifact@v4
        with:
          name: universe-jars
          path: .built/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            .built/universe-loader-*.jar
            .built/universe-extension-*.jar
            .built/universe-minecraft-*.jar
            .built/universe-api-*.jar
            .built/universe-app-*.jar

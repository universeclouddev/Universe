services:

  # Universe master (panel runs separately — see Panel-Andrew repo)
  universe:
    image: git.lunarlabs.dev/scala/universe:latest
    ports:
      - "127.0.0.1:6000:6000" # Hazelcast
      - "127.0.0.1:7000:7000" # REST API
    volumes:
      - ./data:/data
    environment:
      - TERM=xterm-256color
    restart: unless-stopped
    tty: true
    stdin_open: true

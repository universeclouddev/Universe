services:

  # Universe
  universe:
    image: ghcr.io/universeclouddev/universe:latest
    ports:
      - "127.0.0.1:6000:6000" # Map host port 6000 to container port 6000
      - "127.0.0.1:7000:7000" # Map host port 7000 to container port 7000
    volumes:
      - ./data:/data # Mount local folder to container
    environment:
      - TERM=xterm-256color
    restart: unless-stopped
    tty: true
    stdin_open: true
